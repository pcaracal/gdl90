on:
  release:
    types: [published]

name: Generate Swift Package

permissions:
  contents: read

jobs:
  swift-package:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install swift-bridge-cli
        run: cargo install swift-bridge-cli

      - name: Build and package
        shell: bash
        run: |
          set -euxo pipefail

          IOS=aarch64-apple-ios
          SIM=aarch64-apple-ios-sim
          MAC=aarch64-apple-darwin
          LIB=libgdl90.a

          cargo build --release --features swift
          cargo build --release --target $IOS --features swift
          cargo build --release --target $SIM --features swift
          cargo build --release --target $MAC --features swift

          swift-bridge-cli create-package \
            --bridges-dir target/swift/ \
            --out-dir GDL90 \
            --ios target/$IOS/release/$LIB \
            --simulator target/$SIM/release/$LIB \
            --macos target/$MAC/release/$LIB \
            --name GDL90

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GDL90-swift-package
          path: GDL90

      - name: Push Swift package to gdl90-swift
        shell: bash
        env:
          TARGET_REPO: pcaracal/gdl90-swift
          TARGET_BRANCH: master
          GH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
        run: |
          set -euxo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git" target-repo
          cd target-repo
          git checkout "$TARGET_BRANCH"

          rm -rf RustXcframework.xcframework Sources Package.swift

          cp -R ../GDL90/RustXcframework.xcframework .
          cp -R ../GDL90/Sources .
          cp ../GDL90/Package.swift .

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update Swift package from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push origin "$TARGET_BRANCH"
